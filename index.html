<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-
    scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bodyContainer">
        <div class="calculatorContainer">
            <div id="calcScreen">0</div>
            
            <div class="calcButtons">
                <div class="removeButtons">
                    <button id="clearButton">CLEAR</button>
                    <!-- give delete button an id so JS can find it easily -->
                     
                    <button id="deleteButton" class="deleteButton">DELETE</button>
                </div>

                <div id="numButtons">
                    <button class="num">7</button>
                    <button class="num">8</button>
                    <button class="num">9</button>
                    <button class="sign">/</button>

                    <button class="num">4</button>
                    <button class="num">5</button>
                    <button class="num">6</button>
                    <!-- use real * operator for JS instead of x -->

                    <button class="sign">*</button>

                    <button class="num">1</button>
                    <button class="num">2</button>
                    <button class="num">3</button>
                    <button class="sign">-</button>

                    <button class="sign">.</button>
                    <button class="num">0</button>
                    <button class="signEqual">=</button>
                    <button class="sign">+</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src = "script.js"></script>
</body>
</html>
